services:
  - type: web
    name: forja-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FORJA_ADMIN_USERNAME
        sync: false
      - key: FORJA_ADMIN_PASSWORD_HASH
        sync: false
